<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantomize</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#1e3a8a 0%,#1e40af 100%);color:white;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-header{padding:1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.12)}
.sidebar-logo{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.sidebar-logo span{font-size:1.4rem}
.store-name-small{font-size:.75rem;opacity:.7;margin-top:.2rem}
.sidebar-user{padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.12);font-size:.8rem;opacity:.85}
.user-name{font-weight:600;font-size:.875rem}
.user-role{opacity:.65;font-size:.75rem}
nav{flex:1;padding:.75rem 0;overflow-y:auto}
.nav-section{padding:.5rem 1rem .25rem;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.5}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;cursor:pointer;margin:1px 0;transition:background .15s;font-size:.875rem;color:rgba(255,255,255,.85);position:relative}
.nav-item:hover{background:rgba(255,255,255,.1);color:white}
.nav-item.active{background:rgba(255,255,255,.18);color:white;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#93c5fd;border-radius:0 2px 2px 0}
.nav-icon{width:18px;text-align:center}
.sidebar-footer{padding:1rem;border-top:1px solid rgba(255,255,255,.12)}
.logout-btn{width:100%;padding:.5rem;background:rgba(255,255,255,.1);color:white;border:none;border-radius:8px;cursor:pointer;font-size:.8rem;transition:background .15s}
.logout-btn:hover{background:rgba(255,255,255,.2)}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:white;padding:.875rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar-title{font-size:1rem;font-weight:700;color:#0f172a}
.topbar-actions{display:flex;gap:.5rem;align-items:center}
.content{padding:1.5rem;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:white;border-radius:12px;padding:1.25rem;border:1px solid #e2e8f0;transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:.75rem}
.stat-label{font-size:.72rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:1.6rem;font-weight:700;color:#0f172a;margin-top:.2rem}
.stat-sub{font-size:.75rem;color:#94a3b8;margin-top:.15rem}
.table-card{background:white;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:1rem}
.table-header{padding:1rem 1.25rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.table-title{font-weight:700;font-size:.9rem;color:#0f172a}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:#f8fafc;padding:.65rem 1rem;text-align:left;font-size:.72rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid #e2e8f0}
tbody td{padding:.75rem 1rem;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8fafc}
.btn{padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#16a34a;color:white}
.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:white}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:white;color:#374151;border:1px solid #d1d5db}
.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:.3rem .6rem;font-size:.75rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:600;display:inline-block}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-gray{background:#f1f5f9;color:#475569}
input,select,textarea{width:100%;padding:.5rem .75rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;outline:none;font-family:inherit;transition:border-color .2s;background:white;color:#1e293b}
input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.4rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.search-wrap{position:relative}
.search-wrap input{padding-left:2.2rem}
.search-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:#94a3b8}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{max-width:720px}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;font-size:1rem}
.modal-close{cursor:pointer;font-size:1.2rem;color:#94a3b8;background:none;border:none;padding:.2rem;border-radius:4px}
.modal-close:hover{color:#374151}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:.5rem}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:white;padding:.75rem 1.25rem;border-radius:10px;font-size:.85rem;font-weight:500;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s;max-width:320px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#15803d}
#toast.error{background:#b91c1c}
.pos-layout{display:grid;grid-template-columns:1fr 360px;gap:1rem;height:calc(100vh - 120px)}
.pos-products{overflow-y:auto}
.pos-products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;padding:.25rem}
.product-tile{background:white;border-radius:12px;padding:.875rem .75rem;cursor:pointer;border:2px solid #e2e8f0;transition:all .15s;text-align:center;position:relative}
.product-tile:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.15);transform:translateY(-1px)}
.product-tile.out-of-stock{opacity:.45;cursor:not-allowed}
.product-emoji{font-size:2rem;margin-bottom:.4rem}
.product-tile-name{font-size:.78rem;font-weight:600;color:#0f172a;line-height:1.2;margin-bottom:.25rem}
.product-tile-price{font-size:.8rem;color:#2563eb;font-weight:700}
.product-tile-stock{font-size:.7rem;color:#94a3b8}
.stock-low{color:#d97706!important}
.stock-out{color:#dc2626!important}
.pos-cart{background:white;border-radius:12px;border:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.cart-header{padding:1rem;border-bottom:1px solid #e2e8f0;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.cart-items{flex:1;overflow-y:auto}
.cart-item{padding:.75rem 1rem;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:.5rem}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:.75rem;color:#64748b}
.cart-qty{display:flex;align-items:center;gap:.35rem}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#e2e8f0}
.qty-display{font-size:.85rem;font-weight:700;min-width:24px;text-align:center}
.cart-item-total{font-size:.85rem;font-weight:700;color:#0f172a;min-width:60px;text-align:right}
.remove-btn{color:#dc2626;cursor:pointer;padding:.2rem;background:none;border:none;font-size:.9rem}
.cart-summary{padding:1rem;border-top:1px solid #e2e8f0}
.summary-row{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.35rem;color:#64748b}
.summary-row.total{font-size:1rem;font-weight:700;color:#0f172a;padding-top:.5rem;border-top:1px solid #e2e8f0;margin-top:.5rem}
.chart-area{height:200px;display:flex;align-items:flex-end;gap:3px;padding:1rem 1.25rem .5rem}
.chart-bar{flex:1;background:#bfdbfe;border-radius:4px 4px 0 0;min-height:4px;transition:background .15s;cursor:default;position:relative}
.chart-bar:hover{background:#2563eb}
.chart-bar-tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1e293b;color:white;font-size:.65rem;padding:.2rem .4rem;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;margin-bottom:4px}
.chart-bar:hover .chart-bar-tooltip{opacity:1}
.chart-labels{display:flex;gap:3px;padding:0 1.25rem 1rem}
.chart-label{flex:1;text-align:center;font-size:.65rem;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-state{text-align:center;padding:3rem 1rem;color:#94a3b8}
.empty-icon{font-size:3rem;margin-bottom:.75rem}
.empty-title{font-size:1rem;font-weight:600;color:#64748b;margin-bottom:.25rem}
.loading{text-align:center;padding:2rem;color:#94a3b8}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.currency{font-family:'Courier New',monospace}
.text-right{text-align:right}
.text-center{text-align:center}
.gap-sm{display:flex;gap:.5rem}
.divider{height:1px;background:#e2e8f0;margin:1rem 0}
.hamburger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#0f172a;padding:.2rem .4rem;line-height:1}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}
.sidebar-backdrop.open{display:block}
@media(max-width:768px){
  .hamburger{display:block}
  .sidebar{transform:translateX(-100%);width:260px;box-shadow:4px 0 24px rgba(0,0,0,.2)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .content{padding:1rem}
  .topbar{padding:.75rem 1rem}
  .topbar-title{font-size:.95rem}
  .topbar-actions{gap:.35rem;flex-wrap:wrap;justify-content:flex-end}
  .topbar-actions .btn{padding:.45rem .7rem;font-size:.75rem}
  .topbar-actions input[type=date]{font-size:.75rem;padding:.4rem}
  .topbar-actions input[type=text]{width:130px!important}
  .pos-layout{grid-template-columns:1fr;height:auto;gap:.75rem}
  .pos-cart{position:sticky;bottom:0;max-height:none}
  .pos-products-grid{grid-template-columns:repeat(2,1fr);gap:.6rem}
  .product-tile{padding:.9rem .6rem;min-height:110px;display:flex;flex-direction:column;justify-content:center}
  .product-tile:active{transform:scale(.96);border-color:#2563eb;background:#eff6ff}
  .product-emoji{font-size:2rem}
  .product-tile-name{font-size:.82rem}
  .product-tile-price{font-size:.9rem}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr;gap:.75rem}
  .stat-card{padding:1rem}
  .stat-value{font-size:1.3rem}
  /* Reports & dashboard two-column blocks stack */
  .content>div[style*="grid-template-columns:2fr"],
  .content>div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  /* Tables scroll horizontally */
  .table-card>div[style*="overflow-x"],.table-card table{min-width:0}
  table{font-size:.8rem}
  thead th,tbody td{padding:.5rem .6rem}
  .modal{max-width:100%;margin:0;border-radius:14px}
  .modal-lg{max-width:100%}
  .table-header{flex-direction:column;align-items:stretch}
  .table-header .search-wrap input{width:100%!important;max-width:none}
  /* Cart items easier to tap */
  .qty-btn{width:30px;height:30px}
}
@media(max-width:420px){
  .stats-grid{grid-template-columns:1fr}
  .pos-products-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
}
/* Prevent iOS auto-zoom on input focus (needs >=16px) */
@media(max-width:768px){
  input,select,textarea{font-size:16px}
  .search-wrap input{font-size:16px}
}
html{-webkit-text-size-adjust:100%}

/* ── Products: desktop table vs mobile cards ── */
.products-mobile{display:none}
.fab{
  position:fixed;right:1.1rem;bottom:1.3rem;z-index:90;
  width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;
  background:#2563eb;color:#fff;font-size:2rem;line-height:1;
  box-shadow:0 6px 20px rgba(37,99,235,.45);transition:transform .15s,background .15s;
  display:flex;align-items:center;justify-content:center
}
.fab:hover{background:#1d4ed8}
.fab:active{transform:scale(.92)}
.product-card{
  background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:.9rem 1rem;
  margin-bottom:.6rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;
  transition:box-shadow .15s,transform .1s
}
.product-card:active{transform:scale(.99);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.product-card .pc-main{flex:1;min-width:0}
.product-card .pc-name{font-weight:700;font-size:.95rem;color:#0f172a;margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-card .pc-sub{font-size:.75rem;color:#94a3b8;margin-bottom:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-card .pc-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:.4rem}
.product-card .pc-price{font-size:1.05rem;font-weight:800;color:#2563eb}
.product-card .pc-adjust{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:.3rem .6rem;font-size:.72rem;font-weight:600;color:#475569;cursor:pointer}
.product-card .pc-adjust:active{background:#e2e8f0}
@media(max-width:768px){
  .products-desktop{display:none!important}
  .products-mobile{display:block;padding-bottom:80px}
}

@media(max-width:768px){
  .pos-mobile-controls{display:flex!important}
  /* Hide the topbar search/scan on mobile ONLY on POS (shown in-content) */
  body.page-pos #topbarActions{display:none}
}

/* ── Mobile POS ── */
.mobile-cart-bar{display:none}
.cart-sheet-backdrop{display:none}
@media(max-width:768px){
  .pos-layout{display:block;height:auto}
  .pos-products{padding-bottom:80px}
  /* Hide the inline desktop cart on mobile */
  .pos-cart{display:none!important}
  /* Floating bottom cart bar */
  .mobile-cart-bar{
    display:flex;position:fixed;left:0;right:0;bottom:0;z-index:120;
    background:#16a34a;color:#fff;padding:.85rem 1.1rem;align-items:center;
    justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,.18);cursor:pointer
  }
  .mobile-cart-bar.hidden{display:none}
  .mobile-cart-bar .mcb-left{display:flex;align-items:center;gap:.6rem;font-weight:700}
  .mobile-cart-bar .mcb-count{background:rgba(255,255,255,.25);border-radius:999px;padding:.15rem .6rem;font-size:.85rem}
  .mobile-cart-bar .mcb-total{font-size:1.1rem;font-weight:800}
  /* Slide-up cart sheet */
  .cart-sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:130}
  .cart-sheet-backdrop.open{display:block}
  .cart-sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:140;background:#fff;
    border-radius:20px 20px 0 0;max-height:88vh;display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .28s ease
  }
  .cart-sheet.open{transform:translateY(0)}
  .cart-sheet .sheet-handle{width:40px;height:4px;background:#cbd5e1;border-radius:2px;margin:.6rem auto}
  .cart-sheet .cart-items{max-height:38vh}
}

/* Smooth momentum scroll for tables on iOS */
.table-card>div[style*="overflow-x"]{-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span id="sidebarLogo">🏪</span><span id="sidebarStoreName">Store</span></div>
      <div class="store-name-small">Sales & Inventory Management</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="userName">—</div>
      <div class="user-role" id="userRole">—</div>
    </div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">🚪 Sign Out</button>
    </div>
  </aside>

  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:.75rem">
        <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
        <div class="topbar-title" id="pageTitle">Dashboard</div>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="modalContainer"></div>

<script>
// ══════════════════════════════════════════════════════════
//  Config & State
// ══════════════════════════════════════════════════════════
const API_BASE = '';
let TOKEN    = localStorage.getItem('token')    || '';
let ROLE     = localStorage.getItem('role')     || '';
let USERNAME = localStorage.getItem('name')     || '';
let USERID   = localStorage.getItem('userId')   || '';
let SETTINGS = {};
let PRODUCTS   = [];
let CATEGORIES = [];
let CURRENCY = '₱';

// ── Permissions ──────────────────────────────────────────
const PERM_LABELS = {
  dashboard:       '📊 Dashboard',
  pos:             '🛒 Point of Sale (checkout)',
  products_view:   '📦 View products',
  products_manage: '✏️ Manage products & stock',
  stock_log:       '📋 View stock log',
  sales_view_all:  '🧾 View ALL sales (off = own only)',
  sales_void:      '🗑 Void sales',
  reports:         '📈 View reports',
  users_manage:    '👥 Manage users',
  settings_manage: '⚙️ Change settings',
};
const ROLE_DEFAULTS = {
  owner: Object.fromEntries(Object.keys(PERM_LABELS).map(k => [k, true])),
  admin: Object.fromEntries(Object.keys(PERM_LABELS).map(k => [k, true])),
  staff: { dashboard:false, pos:true, products_view:true, products_manage:false,
           stock_log:false, sales_view_all:false, sales_void:false, reports:false,
           users_manage:false, settings_manage:false }
};
let PERMS = JSON.parse(localStorage.getItem('perms') || 'null') || ROLE_DEFAULTS[ROLE] || ROLE_DEFAULTS.staff;

if (!TOKEN) window.location.href = '/login';

// ── API helpers ──────────────────────────────────────────
async function api(endpoint, action, data = {}) {
  try {
    const res = await fetch(API_BASE + '/api/' + endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + TOKEN
      },
      body: JSON.stringify({ action, ...data })
    });
    const json = await res.json();
    if (res.status === 401) { doLogout(); return {}; }
    return json;
  } catch(e) {
    return { success: false, error: 'Network error' };
  }
}

// ── Toast ────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3200);
}

// ── Init ─────────────────────────────────────────────────
function hasPerm(p) { return !p || !!PERMS[p]; }
function can(p) { return hasPerm(p); }  // back-compat alias

async function init() {
  document.getElementById('userName').textContent = USERNAME;
  const roleLabels = { owner:'👑 Owner', admin:'🛡️ Admin', staff:'👤 Staff' };
  document.getElementById('userRole').textContent = roleLabels[ROLE] || '👤 Staff';

  // Refresh permissions from server (picks up changes made by admin)
  try {
    const meRes = await fetch(API_BASE + '/api/auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'me', token: TOKEN })
    });
    const me = await meRes.json();
    if (me.success && me.permissions) {
      PERMS = me.permissions;
      localStorage.setItem('perms', JSON.stringify(PERMS));
      if (me.user?.role) { ROLE = me.user.role; localStorage.setItem('role', ROLE); }
    }
  } catch {}

  renderNav();
  const r = await api('settings', 'getSettings');
  if (r.success) {
    SETTINGS = r.settings;
    CURRENCY = SETTINGS.currency_symbol || '₱';
    document.getElementById('sidebarStoreName').textContent = SETTINGS.store_name || 'Store';
    document.title = (SETTINGS.store_name || 'Quantomize') + ' — Dashboard';
    applySidebarLogo(SETTINGS.store_logo);
  }
  const firstPage = MENU.find(m => m.id && hasPerm(m.perm));
  navigate(firstPage ? firstPage.id : 'sales');
}

// ── Barcode Scanner Support ──────────────────────────────
// Scanners "type" the code very fast and end with Enter.
// This listener catches scans anywhere on the POS page without
// needing to click a field first.
let scanBuffer = '';
let scanTimer = null;
let lastKeyTime = 0;

document.addEventListener('keydown', (e) => {
  // Only active on the POS page
  if (typeof currentPage !== 'undefined' && currentPage !== 'pos') return;
  // Ignore if user is typing in an input (except the hidden scan flow)
  const tag = document.activeElement?.tagName;
  const isTyping = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';

  const now = Date.now();
  const gap = now - lastKeyTime;
  lastKeyTime = now;

  if (e.key === 'Enter') {
    // Fast sequence + Enter = scanner
    if (scanBuffer.length >= 4) {
      const code = scanBuffer;
      scanBuffer = '';
      clearTimeout(scanTimer);
      if (!isTyping || document.activeElement?.id === 'posScanInput') {
        e.preventDefault();
        handleBarcodeScan(code);
      }
      return;
    }
    scanBuffer = '';
    return;
  }

  if (e.key.length === 1) {
    // Human typing has gaps > 50ms; scanners are < 30ms between chars
    if (gap > 100) scanBuffer = '';
    scanBuffer += e.key;
    clearTimeout(scanTimer);
    scanTimer = setTimeout(() => { scanBuffer = ''; }, 300);
  }
});

function handleBarcodeScan(code) {
  const product = PRODUCTS.find(p =>
    (p.barcode && p.barcode === code) ||
    (p.sku && p.sku === code)
  );
  if (!product) {
    toast(`❌ No product with barcode: ${code}`, 'error');
    playBeep(false);
    return;
  }
  if (product.stock <= 0) {
    toast(`⚠️ ${product.name} is out of stock`, 'error');
    playBeep(false);
    return;
  }
  addToCart(product.id);
  toast(`✅ ${product.name} added`, 'success');
  playBeep(true);
}

function playBeep(ok) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = ok ? 1200 : 300;
    gain.gain.value = 0.1;
    osc.start();
    osc.stop(ctx.currentTime + (ok ? 0.08 : 0.25));
  } catch {}
}



// Scan a barcode directly into a form field (used in product editor)
async function scanIntoField(fieldId) {
  const targetId = fieldId;
  showModal(`
    <div class="modal-header">
      <div class="modal-title">📷 Scan Barcode</div>
      <button class="modal-close" onclick="closeCameraScanner()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center">
      <div id="scanStatus" style="font-size:.85rem;color:#64748b;margin-bottom:.75rem">Loading camera…</div>
      <div style="position:relative;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3">
        <video id="scanVideo" style="width:100%;height:100%;object-fit:cover" muted playsinline></video>
        <div style="position:absolute;left:8%;right:8%;top:50%;height:2px;background:#ef4444;transform:translateY(-50%)"></div>
      </div>
      <p style="font-size:.78rem;color:#94a3b8;margin-top:.75rem">Point at the barcode to capture it.</p>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeCameraScanner()">Cancel</button></div>`);

  const status = document.getElementById('scanStatus');
  try {
    if (!window.ZXingBrowser) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/zxing-js.browser/0.1.5/zxing-browser.min.js');
  } catch {
    try { await loadScript('https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js'); }
    catch { status.textContent = '❌ Could not load scanner.'; return; }
  }
  try {
    const { BrowserMultiFormatReader } = window.ZXingBrowser;
    const reader = new BrowserMultiFormatReader();
    scannerActive = true;
    status.textContent = '🔍 Scanning…';
    scannerControls = await reader.decodeFromVideoDevice(undefined, document.getElementById('scanVideo'),
      (result) => {
        if (result && scannerActive) {
          const code = result.getText();
          scannerActive = false;
          try { scannerControls?.stop(); } catch {}
          closeModal();
          const field = document.getElementById(targetId);
          if (field) field.value = code;
          toast('✅ Barcode captured: ' + code, 'success');
          playBeep(true);
        }
      });
  } catch {
    status.textContent = '❌ Camera denied. Allow camera permission and use HTTPS.';
  }
}

// ── Camera Barcode Scanner (in-browser, no hardware) ─────
let scannerActive = false;
let scannerControls = null;

async function openCameraScanner() {
  showModal(`
    <div class="modal-header">
      <div class="modal-title">📷 Camera Scanner</div>
      <button class="modal-close" onclick="closeCameraScanner()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center">
      <div id="scanStatus" style="font-size:.85rem;color:#64748b;margin-bottom:.75rem">Loading camera…</div>
      <div style="position:relative;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3;max-width:100%">
        <video id="scanVideo" style="width:100%;height:100%;object-fit:cover" muted playsinline></video>
        <div style="position:absolute;inset:0;pointer-events:none">
          <div style="position:absolute;left:10%;right:10%;top:50%;height:2px;background:#ef4444;box-shadow:0 0 8px #ef4444;transform:translateY(-50%)"></div>
          <div style="position:absolute;left:8%;right:8%;top:30%;bottom:30%;border:3px solid rgba(255,255,255,.6);border-radius:12px"></div>
        </div>
      </div>
      <p style="font-size:.78rem;color:#94a3b8;margin-top:.75rem">Point the camera at a barcode. It scans automatically.</p>
      <div id="scanLast" style="font-size:.8rem;font-weight:600;margin-top:.5rem;min-height:1.2em"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCameraScanner()">Done</button>
    </div>`);

  const status = document.getElementById('scanStatus');
  try {
    if (!window.ZXingBrowser) {
      status.textContent = 'Loading scanner library…';
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/zxing-js.browser/0.1.5/zxing-browser.min.js');
    }
  } catch {
    // Fallback CDN
    try { await loadScript('https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js'); }
    catch { status.textContent = '❌ Could not load scanner. Check your connection.'; return; }
  }

  try {
    const { BrowserMultiFormatReader } = window.ZXingBrowser;
    const reader = new BrowserMultiFormatReader();
    scannerActive = true;
    status.textContent = '🔍 Scanning… point at a barcode';

    let lastCode = '', lastAt = 0;
    scannerControls = await reader.decodeFromVideoDevice(
      undefined,
      document.getElementById('scanVideo'),
      (result, err) => {
        if (result && scannerActive) {
          const code = result.getText();
          const now = Date.now();
          // Debounce duplicate reads within 1.5s
          if (code === lastCode && now - lastAt < 1500) return;
          lastCode = code; lastAt = now;
          const product = PRODUCTS.find(p => (p.barcode && p.barcode === code) || (p.sku && p.sku === code));
          const lastEl = document.getElementById('scanLast');
          if (product && product.stock > 0) {
            addToCart(product.id);
            playBeep(true);
            if (lastEl) { lastEl.textContent = `✅ ${product.name} added`; lastEl.style.color = '#16a34a'; }
          } else if (product) {
            playBeep(false);
            if (lastEl) { lastEl.textContent = `⚠️ ${product.name} out of stock`; lastEl.style.color = '#d97706'; }
          } else {
            playBeep(false);
            if (lastEl) { lastEl.textContent = `❌ Unknown: ${code}`; lastEl.style.color = '#dc2626'; }
          }
        }
      }
    );
  } catch (e) {
    status.textContent = '❌ Camera access denied or unavailable. Allow camera permission and use HTTPS.';
  }
}

function closeCameraScanner() {
  scannerActive = false;
  try { scannerControls?.stop(); } catch {}
  scannerControls = null;
  closeModal();
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function updateMobileCartBar() {
  const bar = document.getElementById('mobileCartBar');
  if (!bar) return;
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discEl = document.querySelector('.cart-disc-input');
  const discount = discEl ? Number(discEl.value)||0 : 0;
  const total = Math.max(0, subtotal - discount);
  document.getElementById('mcbCount').textContent = count;
  document.getElementById('mcbTotal').textContent = fmt(total);
  bar.classList.toggle('hidden', count === 0);
}

function getCatName(id) { const c = CATEGORIES.find(c=>c.id===id); return c?c.name:'—'; }

function renderTiles(prods) {
  if (!prods.length) return `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No products</div></div>`;
  return prods.map(p => {
    const oos = p.stock <= 0;
    const low = !oos && p.stock <= p.low_stock_alert;
    return `<div class="product-tile ${oos?'out-of-stock':''}" onclick="${oos?'':` addToCart('${p.id}')`}">
      <div class="product-emoji">📦</div>
      <div class="product-tile-name">${escHtml(p.name)}</div>
      <div class="product-tile-price">${fmt(p.selling_price)}</div>
      <div class="product-tile-stock ${oos?'stock-out':low?'stock-low':''}">${oos?'Out of stock':low?`⚠️ ${p.stock} left`:`${p.stock} in stock`}</div>
    </div>`;
  }).join('');
}

function filterPOS(q) {
  const f = PRODUCTS.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||(p.sku||'').toLowerCase().includes(q.toLowerCase()));
  document.getElementById('posGrid').innerHTML = renderTiles(f);
}
function filterPOSCat(catId) {
  const f = catId ? PRODUCTS.filter(p=>p.category_id===catId) : PRODUCTS;
  document.getElementById('posGrid').innerHTML = renderTiles(f);
}

function addToCart(productId) {
  const p = PRODUCTS.find(p=>p.id===productId);
  if (!p||p.stock<=0) return;
  const ex = cart.find(i=>i.productId===productId);
  if (ex) { if(ex.qty>=p.stock){toast('Exceeds stock','error');return;} ex.qty++; }
  else cart.push({productId,name:p.name,price:p.selling_price,qty:1,maxQty:p.stock});
  refreshCart();
}
function removeFromCart(i) { cart.splice(i,1); refreshCart(); }
function changeQty(i,d) {
  const item=cart[i]; const nq=item.qty+d;
  if(nq<1){removeFromCart(i);return;}
  if(nq>item.maxQty){toast('Exceeds stock','error');return;}
  item.qty=nq; refreshCart();
}
function refreshCart() {
  const desktop = document.getElementById('posCart');
  if (desktop) desktop.innerHTML = renderCart();
  const sheet = document.getElementById('cartSheetBody');
  if (sheet && document.getElementById('cartSheet')?.classList.contains('open')) {
    sheet.innerHTML = renderCart();
  }
  updateMobileCartBar();
}

function renderCart() {
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discEl   = document.querySelector('.cart-disc-input');
  const discount = discEl ? Number(discEl.value)||0 : 0;
  const total    = Math.max(0,subtotal-discount);

  const itemsHtml = cart.length===0
    ? `<div class="empty-state" style="padding:2rem"><div class="empty-icon">🛒</div><div class="empty-title">Cart empty</div><div class="empty-desc">Tap products to add</div></div>`
    : cart.map((item,i)=>`
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${escHtml(item.name)}</div>
          <div class="cart-item-price">${fmt(item.price)} each</div>
        </div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div class="cart-item-total">${fmt(item.price*item.qty)}</div>
        <button class="remove-btn" onclick="removeFromCart(${i})">🗑</button>
      </div>`).join('');

  return `
    <div class="cart-header"><span>🛒 Order</span><button class="btn btn-outline btn-sm" onclick="cart=[];refreshCart()">Clear</button></div>
    <div class="cart-items">${itemsHtml}</div>
    <div class="cart-summary">

        <select id="cartPayment">

        onclick="checkout()" ${cart.length===0?'disabled':''}>
        ✅ Checkout — ${fmt(total)}

async function checkout() {
  if (!cart.length) return;
  const discEl   = document.querySelector('.cart-disc-input');
  const discount = discEl ? Number(discEl.value)||0 : 0;
  const customer = document.getElementById('cartCustomer')?.value||'';
  const payment  = document.getElementById('cartPayment')?.value||'cash';
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const total    = Math.max(0,subtotal-discount);
  if (!confirm(`Confirm sale of ${fmt(total)} via ${payment}?`)) return;

  const items = cart.map(i=>({productId:i.productId,qty:i.qty,price:i.price}));
  const r = await api('sales','createSale',{items,discount,paymentMethod:payment,customerName:customer});
  if (r.success) {
    cart=[];
    closeCartSheet();
    const pr = await api('products','getProducts');
    PRODUCTS = pr.products||[];
    renderPOS();
    // Load the sale and offer printing
    const detail = await api('sales','getSaleDetail',{saleId: r.saleId});
    if (detail.success) {
      LAST_SALE = detail.sale;
      showModal(`
        <div class="modal-header"><div class="modal-title">✅ Sale Complete</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body" style="text-align:center">
          <div style="font-size:3rem;margin-bottom:.5rem">🧾</div>
          <div style="font-size:1.1rem;font-weight:700;margin-bottom:.25rem">Receipt ${escHtml(r.receiptNo)}</div>
          <div style="font-size:1.5rem;font-weight:800;color:#16a34a;margin-bottom:1rem">${fmt(r.total)}</div>
          <p style="font-size:.85rem;color:#64748b">Payment received via ${escHtml(payment)}</p>
        </div>
        <div class="modal-footer" style="justify-content:center">
          <button class="btn btn-outline" onclick="closeModal()">New Sale</button>
          <button class="btn btn-primary" onclick="printReceipt()">🖨 Print Receipt</button>
        </div>`);
    } else {
      toast(`✅ Sale done! Receipt: ${r.receiptNo}`,'success');
    }
  } else toast(r.error||'Sale failed','error');
}

function stockBadge(p) {
  if (p.stock<=0) return `<span class="badge badge-red">Out of stock</span>`;
  if (p.stock<=p.low_stock_alert) return `<span class="badge badge-yellow">⚠️ ${p.stock} left</span>`;
  return `<span class="badge badge-green">${p.stock} in stock</span>`;
}

function renderProductsTable(prods) {
  const canManage = can('products_manage');

  const emptyState = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No products found</div>${canManage?`<div class="empty-desc" style="margin-bottom:1rem">Start fast with a ready-made catalog</div><button class="btn btn-primary" onclick="openImportModal()">🇵🇭 Import Sari-Sari Starter Pack</button>`:''}</div>`;

  // Desktop table rows
  const rows = prods.length===0
    ? `<tr><td colspan="8">${emptyState}</td></tr>`
    : prods.map(p=>{
        const adminAct = canManage?`
          <button class="btn btn-outline btn-sm" onclick='openProductModal(${JSON.stringify(p)})'>Edit</button>
          <button class="btn btn-outline btn-sm" onclick='openAdjustStock("${p.id}","${escHtml(p.name)}")'>Adjust</button>
          <button class="btn btn-danger btn-sm" onclick='deleteProduct("${p.id}")'>Del</button>`:'';
        return `<tr>
          <td><strong>${escHtml(p.sku||'—')}</strong></td>
          <td>${escHtml(p.name)}</td>
          <td>${escHtml(p.categories?.name||'—')}</td>

          <td>${stockBadge(p)}</td>

  // Mobile cards
  const cards = prods.length===0
    ? emptyState

      <div class="product-card" ${canManage?`onclick='openProductModal(${JSON.stringify(p).replace(/'/g,"&#39;")})'`:''}>

          <div class="pc-sub">${escHtml(p.categories?.name||'Uncategorized')} · ${escHtml(p.unit)}${p.sku?` · ${escHtml(p.sku)}`:''}</div>
          <div class="pc-badges">${stockBadge(p)}</div>
        </div>
        <div class="pc-right">
          <div class="pc-price">${fmt(p.selling_price)}</div>
          ${canManage?`<button class="pc-adjust" onclick='event.stopPropagation();openAdjustStock("${p.id}","${escHtml(p.name)}")'>± Stock</button>`:''}
        </div>
      </div>`).join('');

  setContent(`

      <div class="table-header">
        <div class="table-title">Products (${prods.length})</div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>

          <thead><tr><th>SKU</th><th>Name</th><th>Category</th><th>Cost</th><th>Price</th><th>Stock</th><th>Unit</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>

    </div>

    <div class="products-mobile">
      <div class="search-wrap" style="margin-bottom:.75rem">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search products…" oninput="filterProductsList(this.value)" style="padding-left:2.2rem;width:100%">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">

        ${canManage?`<button class="btn btn-outline btn-sm" onclick="openImportModal()">📥 Import</button>`:''}
      </div>

async function runImport(templateId) {
  const btn = document.getElementById('importBtn_' + templateId);
  const stock = document.getElementById('importStock_' + templateId)?.value || 20;
  btn.disabled = true;
  btn.textContent = 'Importing…';
  const r = await api('products', 'importTemplate', { templateId, defaultStock: stock });
  if (r.success) {
    toast(`✅ Imported ${r.imported} products${r.skipped ? ` (${r.skipped} skipped — already exist)` : ''}`, 'success');
    closeModal();
    PAGES.products();
  } else {
    toast(r.error, 'error');
    btn.disabled = false;
    btn.textContent = 'Import';
  }
}

async function saveProduct(id) {
  const data = {
    sku:g('pSku')||null, name:g('pName'), category_id:g('pCategory')||null,
    cost_price:g('pCost'), selling_price:g('pPrice'),
    stock:g('pStock')||0, unit:g('pUnit'),
    low_stock_alert:g('pAlert'), barcode:g('pBarcode')||null
  };
  if (!data.name||!data.selling_price) return toast('Name and price required','error');
  const r = id ? await api('products','updateProduct',{id,...data}) : await api('products','addProduct',data);
  if (r.success) { toast(id?'Product updated':'Product added','success'); closeModal(); PAGES.products(); }
  else toast(r.error,'error');
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  const r = await api('products','deleteProduct',{id});
  if (r.success) { toast('Deleted','success'); PAGES.products(); }
  else toast(r.error,'error');
}

async function voidSale(saleId) {
  if (!confirm('Void this sale? Stock will be restored.')) return;
  const r = await api('sales','voidSale',{saleId});
  if (r.success) { toast('Sale voided','success'); PAGES.sales(); }
  else toast(r.error,'error');
}

PAGES.reports = async () => {
  const today = new Date();
  const from  = new Date(today.getFullYear(),today.getMonth(),1).toISOString().split('T')[0];
  const to    = today.toISOString().split('T')[0];
  document.getElementById('topbarActions').innerHTML = `
    <input type="date" id="rFrom" value="${from}" style="width:auto">

  const to   = document.getElementById('rTo')?.value;
  const [sumR,prodR,staffR] = await Promise.all([
    api('sales','getReports',{type:'summary', from,to}),
    api('sales','getReports',{type:'products',from,to}),
    api('sales','getReports',{type:'staff',   from,to}),
  ]);
  const s = sumR.summary||{};
  LAST_REPORT = {
    from, to,
    summary: s,
    products: prodR.products || [],
    staff: staffR.staff || []

  const prodRows = (prodR.products||[]).map((p,i)=>`

  ).join('')||`<tr><td colspan="5" class="text-center" style="padding:1rem;color:#94a3b8">No data</td></tr>`;

      <div class="stat-card"><div class="stat-label">Discounts</div><div class="stat-value">${fmt(s.totalDiscount||0)}</div></div>

function openUserModal(u=null) {
  const isEdit=!!u;
  const role  = u?.role || 'staff';
  const perms = { ...(ROLE_DEFAULTS[role] || ROLE_DEFAULTS.staff) };
  if (u?.permissions && typeof u.permissions === 'object') {
    for (const [k,v] of Object.entries(u.permissions)) if (k in perms) perms[k] = !!v;
  }
  const permBoxes = PERM_LIST.map(p => `
    <label style="display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .75rem;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;margin-bottom:.5rem">
      <input type="checkbox" class="perm-box" data-perm="${p.key}" ${perms[p.key]?'checked':''} style="width:auto;margin-top:.2rem">
      <span>
        <span style="font-size:.85rem;font-weight:600;display:block">${p.label}</span>
        <span style="font-size:.75rem;color:#94a3b8">${p.desc}</span>
      </span>
    </label>`).join('');

  showModal(`
    <div class="modal-header"><div class="modal-title">${isEdit?'Edit':'Add'} User</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" id="uName" value="${escHtml(u?.full_name||'')}"></div>
        <div class="form-group"><label>Username *</label><input type="text" id="uUsername" value="${escHtml(u?.username||'')}"></div>
      </div>
      ${!isEdit?`<div class="form-group"><label>Email *</label><input type="email" id="uEmail" placeholder="user@email.com"></div>`:''}
      <div class="form-row">
        <div class="form-group"><label>Role *</label>
          <select id="uRole" onchange="togglePermSection()"><option value="staff" ${u?.role==='staff'?'selected':''}>Staff</option><option value="admin" ${u?.role==='admin'?'selected':''}>Admin</option></select>
        </div>
        <div class="form-group"><label>${isEdit?'New Password (optional)':'Password *'}</label>
          <input type="password" id="uPassword" placeholder="${isEdit?'Leave blank to keep':'Min 8 chars'}">
        </div>
      </div>
      <div id="permSection">
        <div style="font-size:.82rem;font-weight:700;color:#374151;margin:.5rem 0 .6rem">🔐 Access Permissions</div>
        <p style="font-size:.75rem;color:#94a3b8;margin-bottom:.75rem">Choose exactly which tasks this user can do. Selecting a role resets these to that role's defaults.</p>
        ${permBoxes}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser('${u?.id||''}')">
        ${isEdit?'Save Changes':'Add User'}
      </button>
    </div>`);
}

function togglePermSection() {
  const role = document.getElementById('uRole').value;
  const defs = ROLE_DEFAULTS[role] || ROLE_DEFAULTS.staff;
  document.querySelectorAll('.perm-box').forEach(cb => { cb.checked = !!defs[cb.dataset.perm]; });
}

function collectPerms() {
  const perms = {};
  document.querySelectorAll('.perm-box').forEach(cb => {
    perms[cb.dataset.perm] = cb.checked;
  });
  return perms;
}

async function saveUser(id) {
  const permissions = collectPerms();
  const hasPermUi = document.querySelectorAll('.perm-box').length > 0;
  const data={full_name:g('uName'),username:g('uUsername'),email:g('uEmail'),
    role:g('uRole'),password:g('uPassword'),
    ...(hasPermUi ? { permissions } : {})};
  if(!data.full_name||(!id&&(!data.email||!data.password))) return toast('Fill required fields','error');
  const r=id?await api('users','updateUser',{id,...data}):await api('users','addUser',data);
  if(r.success){toast(id?'Updated':'User added','success');closeModal();PAGES.users();}
  else toast(r.error,'error');
}

async function removeUser(id) {
  if(!confirm('Deactivate this user?')) return;
  const r=await api('users','deleteUser',{id});
  if(r.success){toast('User deactivated','success');PAGES.users();}
  else toast(r.error,'error');
}

let PENDING_LOGO = undefined; // undefined = unchanged, '' = removed, string = new data URL

function handleLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) { toast('Image too large — use one under 500KB', 'error'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    // Downscale to max 300px to keep it small
    const img = new Image();
    img.onload = () => {
      const max = 300;
      let { width, height } = img;
      if (width > max || height > max) {
        if (width > height) { height = height * max / width; width = max; }
        else { width = width * max / height; height = max; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/png');
      PENDING_LOGO = dataUrl;
      const prev = document.getElementById('logoPreview');
      if (prev) prev.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:contain">`;
      toast('Logo ready — click Save to apply', 'success');
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function removeLogo() {
  PENDING_LOGO = '';
  const prev = document.getElementById('logoPreview');
  if (prev) prev.innerHTML = '<span style="font-size:2rem">🏪</span>';
  toast('Logo will be removed — click Save to apply', 'success');
}

async function saveSettings() {
  const counter = parseInt(g('sCounter'));
  if (!counter || counter < 1) return toast('Next receipt number must be 1 or higher', 'error');
  const settings={store_name:g('sName'),store_address:g('sAddr'),store_phone:g('sPhone'),
    tin_number:g('sTin'),currency_symbol:g('sCur'),tax_rate:g('sTax'),
    receipt_prefix:g('sPrefix')||'RCP',receipt_counter:String(counter)};
  if (PENDING_LOGO !== undefined) settings.store_logo = PENDING_LOGO;
  const r=await api('settings','saveSettings',{settings});
  if(r.success){
    toast('Settings saved','success');
    CURRENCY=settings.currency_symbol||'₱';
    SETTINGS={...SETTINGS,...settings};
    document.getElementById('sidebarStoreName').textContent = settings.store_name || 'Store';
    if (PENDING_LOGO !== undefined) { applySidebarLogo(PENDING_LOGO); PENDING_LOGO = undefined; }
  }
  else toast(r.error,'error');
}

// ── Start ─────────────────────────────────────────────────
init();
</script>
