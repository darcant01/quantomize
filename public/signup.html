<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantomize — Create Your Store</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 50%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#1e40af,#2563eb);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:.75rem;box-shadow:0 8px 20px rgba(37,99,235,.3)}
h1{font-size:1.4rem;font-weight:700;color:#111827;margin-bottom:.25rem}
.subtitle{color:#6b7280;font-size:.85rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.35rem}
input{width:100%;padding:.7rem 1rem;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.btn{width:100%;padding:.85rem;background:linear-gradient(135deg,#1e40af,#2563eb);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:.5rem;box-shadow:0 4px 15px rgba(37,99,235,.35)}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:.7rem 1rem;font-size:.85rem;margin-bottom:1rem;display:none}
.footer{text-align:center;color:#9ca3af;font-size:.8rem;margin-top:1.25rem}
.footer a{color:#2563eb;text-decoration:none;font-weight:600}
.trial-note{background:#eff6ff;border:1px solid #dbeafe;color:#1d4ed8;border-radius:8px;padding:.6rem 1rem;font-size:.8rem;text-align:center;margin-bottom:1.25rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quantomize">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <h1>Create your store</h1>
    <p class="subtitle">Set up Quantomize for your business in 30 seconds</p>
  </div>

  <div class="trial-note">✨ Free 14-day trial · No credit card needed</div>
  <div class="error" id="errorBox"></div>

  <div class="form-group">
    <label>Store Name</label>
    <input type="text" id="storeName" placeholder="e.g. Maria's Mini Mart">
  </div>
  <div class="form-group">
    <label>Your Full Name</label>
    <input type="text" id="fullName" placeholder="e.g. Maria Santos">
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
  </div>

  <button class="btn" id="signupBtn" onclick="doSignup()">Create My Store</button>

  <p class="footer">Already have an account? <a href="/login">Sign in</a></p>
</div>

<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

async function doSignup() {
  const storeName = document.getElementById('storeName').value.trim();
  const fullName  = document.getElementById('fullName').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const btn       = document.getElementById('signupBtn');
  const errorBox  = document.getElementById('errorBox');

  errorBox.style.display = 'none';
  if (!storeName || !fullName || !email || !password) {
    errorBox.textContent = 'Please fill in all fields.';
    errorBox.style.display = 'block';
    return;
  }
  if (password.length < 8) {
    errorBox.textContent = 'Password must be at least 8 characters.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating your store…';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'signup', storeName, fullName, email, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('token',     data.token);
      localStorage.setItem('role',      data.role);
      localStorage.setItem('name',      data.name);
      localStorage.setItem('username',  data.username);
      localStorage.setItem('userId',    data.userId);
      localStorage.setItem('storeName', data.storeName);
      if (data.permissions) localStorage.setItem('perms', JSON.stringify(data.permissions));
      window.location.href = '/app';
    } else {
      errorBox.textContent = data.error || 'Signup failed.';
      errorBox.style.display = 'block';
    }
  } catch (e) {
    errorBox.textContent = 'Connection error. Please try again.';
    errorBox.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Create My Store';
}
</script>
<script>
  // Register service worker (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    });
  }
  // Capture install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'inline-flex';
  });
  async function installApp() {
    if (!deferredPrompt) {
      alert('To install:\n\niPhone/iPad (Safari): tap Share → Add to Home Screen.\nAndroid (Chrome): tap ⋮ menu → Install app.\nDesktop (Chrome/Edge): click the install icon in the address bar.');
      return;
    }
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'none';
  }
</script>
</body>
</html>
