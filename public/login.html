<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantomize — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 50%, #2563eb 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-icon {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 30px; margin-bottom: 1rem;
    box-shadow: 0 8px 20px rgba(37,99,235,0.3);
  }
  h1 { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 0.25rem; }
  .subtitle { color: #6b7280; font-size: 0.875rem; }
  .store-name { color: #2563eb; font-weight: 600; }
  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
  input {
    width: 100%; padding: 0.75rem 1rem;
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
  .pwd-wrap { position: relative; }
  .pwd-toggle {
    position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: #9ca3af; background: none; border: none; font-size: 1.1rem;
  }
  .btn {
    width: 100%; padding: 0.875rem;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: white; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; margin-top: 0.5rem;
    box-shadow: 0 4px 15px rgba(37,99,235,0.35);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error {
    background: #fef2f2; color: #dc2626;
    border: 1px solid #fecaca; border-radius: 8px;
    padding: 0.75rem 1rem; font-size: 0.875rem;
    margin-bottom: 1rem; display: none;
  }
  .footer { text-align: center; color: #9ca3af; font-size: 0.75rem; margin-top: 1.5rem; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <h1>Quantomize</h1>
    <p class="subtitle">Sign in to <span class="store-name" id="storeName">Quantomize</span></p>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <div class="pwd-wrap">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      <button class="pwd-toggle" onclick="togglePwd()">👁</button>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <p class="footer">New to Quantomize? <a href="/signup" style="color:#2563eb;text-decoration:none;font-weight:600">Create your store free</a></p>
</div>

<script>
  const API = '';  // same origin — Vercel serves both frontend and API

  async function loadStoreName() {
    try {
      const r = await fetch(API + '/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getSettings' })
      });
      // Settings needs auth, so skip silently if it fails
    } catch {}
  }

  function togglePwd() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Redirect if already logged in
  const token = localStorage.getItem('token');
  if (token) window.location.href = '/app';

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');

    errorBox.style.display = 'none';
    if (!email || !password) {
      errorBox.textContent = 'Please enter your email and password.';
      errorBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      const res = await fetch(API + '/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'login', email, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token',    data.token);
        localStorage.setItem('role',     data.role);
        localStorage.setItem('name',     data.name);
        localStorage.setItem('username', data.username);
        localStorage.setItem('userId',   data.userId);
        window.location.href = '/app';
      } else {
        errorBox.textContent = data.error || 'Login failed.';
        errorBox.style.display = 'block';
      }
    } catch (e) {
      errorBox.textContent = 'Connection error. Please try again.';
      errorBox.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
</script>
</body>
</html>
