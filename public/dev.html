<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantomize — Developer Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;min-height:100vh}
.topbar{background:#1e293b;padding:.875rem 1.5rem;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-weight:700;display:flex;align-items:center;gap:.5rem}
.dev-badge{background:#7c3aed;color:white;font-size:.65rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;text-transform:uppercase}
.content{padding:1.5rem;max-width:1200px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#1e293b;border-radius:12px;padding:1.25rem;border:1px solid #334155}
.stat-label{font-size:.72rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:1.6rem;font-weight:700;color:#f1f5f9;margin-top:.2rem}
.card{background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden;margin-bottom:1.25rem}
.card-header{padding:1rem 1.25rem;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.card-title{font-weight:700;color:#f1f5f9}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:#0f172a;padding:.6rem 1rem;text-align:left;font-size:.7rem;font-weight:600;color:#94a3b8;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #334155}
tbody td{padding:.7rem 1rem;border-bottom:1px solid #293548;color:#cbd5e1;vertical-align:middle}
tbody tr:hover{background:#26334a}
.btn{padding:.45rem .9rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:.35rem}
.btn-primary{background:#7c3aed;color:white}
.btn-primary:hover{background:#6d28d9}
.btn-danger{background:#dc2626;color:white}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:transparent;color:#cbd5e1;border:1px solid #475569}
.btn-outline:hover{border-color:#7c3aed;color:#a78bfa}
.btn-sm{padding:.3rem .6rem;font-size:.72rem}
.badge{padding:.18rem .55rem;border-radius:999px;font-size:.68rem;font-weight:600;display:inline-block}
.badge-green{background:#14532d;color:#86efac}
.badge-red{background:#7f1d1d;color:#fca5a5}
.badge-purple{background:#4c1d95;color:#c4b5fd}
.badge-blue{background:#1e3a8a;color:#93c5fd}
.badge-yellow{background:#713f12;color:#fde047}
input,select{width:100%;padding:.55rem .75rem;border:1.5px solid #334155;border-radius:8px;font-size:.85rem;outline:none;background:#0f172a;color:#e2e8f0;font-family:inherit}
input:focus,select:focus{border-color:#7c3aed}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:#94a3b8;margin-bottom:.35rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{padding:1.1rem 1.5rem;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;color:#f1f5f9}
.modal-close{cursor:pointer;font-size:1.2rem;color:#64748b;background:none;border:none}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid #334155;display:flex;justify-content:flex-end;gap:.5rem}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#f1f5f9;color:#0f172a;padding:.75rem 1.25rem;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}
#toast.error{background:#dc2626;color:white}
#toast.success{background:#16a34a;color:white}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:2.5rem;width:100%;max-width:400px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #334155;border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:2rem;color:#64748b}
.mono{font-family:'Courier New',monospace;font-size:.78rem;color:#94a3b8}
.diag-row{display:flex;justify-content:space-between;padding:.5rem 1.25rem;border-bottom:1px solid #293548;font-size:.82rem}
.tabs{display:flex;gap:.25rem;padding:.5rem 1.25rem 0}
.tab{padding:.5rem 1rem;cursor:pointer;font-size:.82rem;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent}
.tab.active{color:#a78bfa;border-bottom-color:#7c3aed}
</style>
</head>
<body>

<!-- Dev key gate -->
<div class="login-wrap" id="gateView">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🛠️</div>
      <h1 style="font-size:1.3rem;color:#f1f5f9">Developer Hub</h1>
      <p style="font-size:.82rem;color:#64748b;margin-top:.25rem">Quantomize Platform Administration</p>
    </div>
    <div class="form-group">
      <label>Developer Key</label>
      <input type="password" id="devKeyInput" placeholder="Enter your DEV_KEY">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:.75rem" onclick="unlock()">Unlock</button>
    <p id="gateError" style="color:#fca5a5;font-size:.8rem;margin-top:.75rem;text-align:center;display:none"></p>
  </div>
</div>

<!-- Main hub -->
<div id="hubView" style="display:none">
  <div class="topbar">
    <div class="topbar-title">🛠️ Quantomize <span class="dev-badge">Dev Hub</span></div>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-outline btn-sm" onclick="runDiagnostics()">🩺 Diagnostics</button>
      <button class="btn btn-outline btn-sm" onclick="loadAll()">↻ Refresh</button>
      <button class="btn btn-outline btn-sm" onclick="lock()">🔒 Lock</button>
    </div>
  </div>
  <div class="content">
    <div class="stats-grid" id="statsGrid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">🏢 All Stores</div>
        <input type="text" placeholder="Search stores…" oninput="filterStores(this.value)" style="max-width:220px">
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Store</th><th>Plan</th><th>Status</th><th>Trial Ends</th>
            <th>Users</th><th>Products</th><th>Sales</th><th>Revenue</th><th>Created</th><th>Actions</th>
          </tr></thead>
          <tbody id="storesBody"><tr><td colspan="10" class="loading"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="card" id="diagCard" style="display:none">
      <div class="card-header"><div class="card-title">🩺 System Diagnostics</div></div>
      <div id="diagBody"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="modalContainer"></div>

<script>
let DEV_KEY = sessionStorage.getItem('devKey') || '';
let STORES = [];

async function api(action, data = {}) {
  try {
    const res = await fetch('/api/dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEV_KEY },
      body: JSON.stringify({ action, ...data })
    });
    return res.json();
  } catch { return { success: false, error: 'Network error' }; }
}

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3200);
}
function fmt(n) { return '₱' + Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'}) : '—'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function g(id) { const el=document.getElementById(id); return el?el.value.trim():''; }
function showModal(html) { document.getElementById('modalContainer').innerHTML =
  `<div class="modal-overlay open" onclick="if(event.target.classList.contains('modal-overlay'))closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }

async function unlock() {
  DEV_KEY = document.getElementById('devKeyInput').value.trim();
  const r = await api('overview');
  if (r.success) {
    sessionStorage.setItem('devKey', DEV_KEY);
    document.getElementById('gateView').style.display = 'none';
    document.getElementById('hubView').style.display = 'block';
    loadAll();
  } else {
    const err = document.getElementById('gateError');
    err.textContent = r.error || 'Invalid key';
    err.style.display = 'block';
  }
}
function lock() { sessionStorage.removeItem('devKey'); location.reload(); }
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('gateView').style.display !== 'none') unlock();
});

async function loadAll() {
  const [ov, st] = await Promise.all([api('overview'), api('getStores')]);
  if (ov.success) {
    const o = ov.overview;
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Stores</div><div class="stat-value">${o.storeCount}</div></div>
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value">${o.userCount}</div></div>
      <div class="stat-card"><div class="stat-label">Total Sales</div><div class="stat-value">${o.saleCount}</div></div>
      <div class="stat-card"><div class="stat-label">Platform GMV</div><div class="stat-value">${fmt(o.totalGMV)}</div></div>`;
  }
  if (st.success) { STORES = st.stores; renderStores(STORES); }
}

function renderStores(stores) {
  const planBadge = { free:'badge-blue', pro:'badge-purple', enterprise:'badge-yellow' };
  document.getElementById('storesBody').innerHTML = stores.length === 0
    ? `<tr><td colspan="10" style="text-align:center;padding:2rem;color:#64748b">No stores yet</td></tr>`
    : stores.map(s => `
      <tr>
        <td><strong style="color:#f1f5f9">${esc(s.name)}</strong><br><span class="mono">${s.id.slice(0,8)}…</span></td>
        <td><span class="badge ${planBadge[s.plan]||'badge-blue'}">${s.plan}</span></td>
        <td><span class="badge ${s.active?'badge-green':'badge-red'}">${s.active?'Active':'Suspended'}</span></td>
        <td>${fmtDate(s.trial_ends)}</td>
        <td>${s.userCount}</td>
        <td>${s.productCount}</td>
        <td>${s.saleCount}</td>
        <td>${fmt(s.revenue)}</td>
        <td>${fmtDate(s.created_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-outline btn-sm" onclick="openStore('${s.id}')">Manage</button>
        </td>
      </tr>`).join('');
}

function filterStores(q) {
  renderStores(STORES.filter(s => s.name.toLowerCase().includes(q.toLowerCase())));
}

async function openStore(storeId) {
  const r = await api('getStoreDetail', { storeId });
  if (!r.success) return toast(r.error, 'error');
  const { store, users, settings } = r;

  const usersHtml = users.map(u => `
    <tr>
      <td><strong style="color:#f1f5f9">${esc(u.full_name)}</strong><br><span class="mono">${esc(u.email)}</span></td>
      <td><span class="badge ${u.role==='owner'?'badge-purple':u.role==='admin'?'badge-blue':'badge-green'}">${u.role}</span></td>
      <td><span class="badge ${u.active?'badge-green':'badge-red'}">${u.active?'Active':'Off'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick='openUserEdit(${JSON.stringify(u).replace(/'/g,"&#39;")}, "${store.id}")'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick='devDeleteUser("${u.id}","${store.id}")'>Del</button>
      </td>
    </tr>`).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">🏢 ${esc(store.name)}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Store Name</label>
          <input type="text" id="mStoreName" value="${esc(store.name)}">
        </div>
        <div class="form-group">
          <label>Plan</label>
          <select id="mPlan">
            <option value="free" ${store.plan==='free'?'selected':''}>Free</option>
            <option value="pro" ${store.plan==='pro'?'selected':''}>Pro</option>
            <option value="enterprise" ${store.plan==='enterprise'?'selected':''}>Enterprise</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="mActive">
            <option value="true" ${store.active?'selected':''}>Active</option>
            <option value="false" ${!store.active?'selected':''}>Suspended</option>
          </select>
        </div>
        <div class="form-group">
          <label>Trial Ends: ${fmtDate(store.trial_ends)}</label>
          <button class="btn btn-outline" style="width:100%" onclick="extendTrial('${store.id}')">+ Extend 14 days</button>
        </div>
      </div>
      <div style="display:flex;gap:.5rem;margin-bottom:1.25rem">
        <button class="btn btn-primary" onclick="saveStore('${store.id}')">💾 Save Store</button>
        <button class="btn btn-danger" onclick="devDeleteStore('${store.id}','${esc(store.name)}')">🗑 Delete Store</button>
      </div>
      <div style="border-top:1px solid #334155;padding-top:1rem">
        <div style="font-weight:700;color:#f1f5f9;margin-bottom:.75rem">👥 Users (${users.length})</div>
        <table>
          <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${usersHtml || '<tr><td colspan="4" style="text-align:center;color:#64748b;padding:1rem">No users</td></tr>'}</tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>`);
}

async function saveStore(storeId) {
  const r = await api('updateStore', {
    storeId,
    name:   g('mStoreName'),
    plan:   g('mPlan'),
    active: g('mActive') === 'true'
  });
  if (r.success) { toast('Store updated', 'success'); closeModal(); loadAll(); }
  else toast(r.error, 'error');
}

async function extendTrial(storeId) {
  const r = await api('extendTrial', { storeId, days: 14 });
  if (r.success) { toast('Trial extended to ' + fmtDate(r.newTrialEnd), 'success'); closeModal(); loadAll(); }
  else toast(r.error, 'error');
}

async function devDeleteStore(storeId, name) {
  if (!confirm(`⚠️ PERMANENTLY delete "${name}" and ALL its data (users, products, sales)? This cannot be undone.`)) return;
  if (!confirm(`Really sure? Type of confirmation: deleting "${name}" now.`)) return;
  const r = await api('deleteStore', { storeId });
  if (r.success) { toast('Store deleted', 'success'); closeModal(); loadAll(); }
  else toast(r.error, 'error');
}

function openUserEdit(u, storeId) {
  showModal(`
    <div class="modal-header">
      <div class="modal-title">✏️ ${esc(u.full_name)}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Full Name</label><input type="text" id="uName" value="${esc(u.full_name)}"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="uRole">
            <option value="owner" ${u.role==='owner'?'selected':''}>Owner</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
            <option value="staff" ${u.role==='staff'?'selected':''}>Staff</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="uActive">
            <option value="true" ${u.active?'selected':''}>Active</option>
            <option value="false" ${!u.active?'selected':''}>Disabled</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Reset Password (leave blank to keep)</label>
        <input type="password" id="uPassword" placeholder="New password">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="openStore('${storeId}')">← Back</button>
      <button class="btn btn-primary" onclick="devSaveUser('${u.id}','${storeId}')">Save User</button>
    </div>`);
}

async function devSaveUser(userId, storeId) {
  const r = await api('updateUser', {
    userId,
    full_name: g('uName'),
    role:      g('uRole'),
    active:    g('uActive') === 'true',
    password:  g('uPassword') || undefined
  });
  if (r.success) { toast('User updated', 'success'); openStore(storeId); }
  else toast(r.error, 'error');
}

async function devDeleteUser(userId, storeId) {
  if (!confirm('Permanently delete this user account?')) return;
  const r = await api('deleteUser', { userId });
  if (r.success) { toast('User deleted', 'success'); openStore(storeId); }
  else toast(r.error, 'error');
}

async function runDiagnostics() {
  document.getElementById('diagCard').style.display = 'block';
  document.getElementById('diagBody').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const r = await api('diagnostics');
  if (r.success) {
    document.getElementById('diagBody').innerHTML = Object.entries(r.checks).map(([k,v]) => `
      <div class="diag-row">
        <span class="mono">${k}</span>
        <span style="color:${String(v).startsWith('ERROR')?'#fca5a5':'#86efac'}">${v}</span>
      </div>`).join('');
  } else {
    document.getElementById('diagBody').innerHTML = `<div class="diag-row" style="color:#fca5a5">${r.error}</div>`;
  }
}

// Auto-unlock if key stored
if (DEV_KEY) unlock();
</script>
</body>
</html>
